<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>OBN Manufacturers Index</title>

<style>
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    margin: 0;
    background: #f2f2f7;
    color: #1c1c1e;
}

.header {
    position: sticky;
    top: 0;
    background: white;
    padding: 16px;
    border-bottom: 1px solid #ddd;
    z-index: 10;
}

h1 {
    margin: 0;
    font-size: 22px;
}

input {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    font-size: 16px;
    border-radius: 10px;
    border: none;
    background: #e5e5ea;
    outline: none;
}

.meta {
    font-size: 12px;
    color: gray;
    margin-top: 8px;
    display: flex;
    justify-content: space-between;
}

.container {
    padding: 12px;
}

.card {
    background: white;
    padding: 14px;
    margin-bottom: 10px;
    border-radius: 12px;
    border: 1px solid #e5e5ea;
}

.title {
    display: flex;
    justify-content: space-between;
    font-weight: 700;
    font-size: 16px;
}

.badge {
    font-size: 12px;
    background: #e1f5fe;
    padding: 4px 8px;
    border-radius: 6px;
    color: #0288d1;
}

.small {
    font-size: 13px;
    color: #444;
    margin-top: 4px;
}

.actions {
    display: flex;
    gap: 8px;
    margin-top: 10px;
}

.btn {
    flex: 1;
    padding: 10px;
    text-align: center;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    text-decoration: none;
}

.call { background: #34c759; color: white; }
.text { background: #5ac8fa; color: white; }
.link { background: #007aff; color: white; }
.disabled { background: #ddd; color: #999; }
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
</head>

<body>

<div class="header">
    <h1>OBN Manufacturers</h1>

    <input id="search" placeholder="Search name, DBA, city, OBN, phone..." />

    <div class="meta">
        <span id="count">Loading...</span>
        <span>Live Google Sheet</span>
    </div>
</div>

<div class="container" id="list"></div>

<script>

const SHEET_URL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vR1Tk13j5J_QS_MSIFetJ5iuKZaMUwIyF3xbIzztdlyivLrYSxgH2Rtshv-lHShaw/pub?output=csv";

let data = [];
let filtered = [];

function normalize(row) {
    const keys = {};
    Object.keys(row || {}).forEach(k => {
        keys[k.toLowerCase().trim()] = row[k];
    });

    return {
        obn: keys["obn #"] || "",
        name: keys["registered name"] || "",
        dba: keys["dba name"] || "",
        city: keys["business address city"] || "",
        state: keys["business address state"] || "",
        phone: keys["phone #"] || "",
        phone_digits: (keys["phone #"] || "").replace(/\D/g, ""),
        link: keys["obn link"] || ""
    };
}

function render() {
    const list = document.getElementById("list");

    document.getElementById("count").innerText =
        `Showing ${filtered.length} records`;

    if (!filtered.length) {
        list.innerHTML = "<div style='padding:20px'>No results found</div>";
        return;
    }

    list.innerHTML = filtered.map(i => `
        <div class="card">

            <div class="title">
                <div>${i.name || "Unknown"}</div>
                <div class="badge">#${i.obn || "-"}</div>
            </div>

            <div class="small"><b>DBA:</b> ${i.dba || "-"}</div>
            <div class="small"><b>City:</b> ${i.city || "-"}, ${i.state || ""}</div>
            <div class="small"><b>Phone:</b> ${i.phone || "-"}</div>

            <div class="actions">

                ${i.link
                    ? `<a class="btn link" href="${i.link}" target="_blank" rel="noopener">
                        🌐 OBN
                       </a>`
                    : `<div class="btn disabled">🌐 OBN</div>`
                }

                ${i.phone_digits
                    ? `<a class="btn call" href="tel:${i.phone_digits}">
                        📞 Call
                       </a>`
                    : `<div class="btn disabled">📞 Call</div>`
                }

                ${i.phone_digits
                    ? `<a class="btn text" href="sms:${i.phone_digits}">
                        💬 Text
                       </a>`
                    : `<div class="btn disabled">💬 Text</div>`
                }

            </div>
        </div>
    `).join("");
}

function filter(q) {
    q = q.toLowerCase();

    filtered = data.filter(i =>
        (i.name || "").toLowerCase().includes(q) ||
        (i.dba || "").toLowerCase().includes(q) ||
        (i.city || "").toLowerCase().includes(q) ||
        (i.obn || "").toLowerCase().includes(q) ||
        (i.phone || "").toLowerCase().includes(q)
    );

    render();
}

document.getElementById("search").addEventListener("input", e => {
    filter(e.target.value);
});

function loadData() {
    Papa.parse(SHEET_URL, {
        download: true,
        header: true,
        skipEmptyLines: true,
        complete: (res) => {
            data = res.data.map(normalize);
            filtered = data;
            render();
        }
    });
}

loadData();

</script>

</body>
</html>
